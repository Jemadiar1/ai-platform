# ============================================================
# Docker Compose para Producción en VPS
# ============================================================
# Servicios:
#   - app: AI Platform backend (FastAPI + Odin)
#   - postgres: Base de datos PostgreSQL
#   - redis: Broker de Celery
#   - nginx: Reverse proxy con HTTPS
#
# PUERTOS:
#   - 80  → HTTP (redirige a 443)
#   - 443 → HTTPS (nginx proxya a app:4000)
#   - 5432 → PostgreSQL (SOLO interno, redes docker)
#   - 6379 → Redis (SOLO interno, redes docker)
#
# Uso:
#   docker compose -f infra/docker/docker-compose.prod.yml up -d
#
# Seguridad:
#   - Solo 80 y 443 expuestos al exterior
#   - PostgreSQL/Redis en red privada (ai-platform-network)
#   - Let's Encrypt SSL con certbot montado en ./nginx/ssl
# ============================================================

services:
  # ---- AI Platform Backend ----
  app:
    image: ai-platform-app:latest
    container_name: ai-platform-api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      # Entorno
      - APP_ENV=production
      - ENVIRONMENT=production
      - DEBUG=false

      # Base de datos (conectado a postgres container)
      - DATABASE_URL=postgresql+psycopg://aiplatform:${POSTGRES_PASSWORD}@postgres:5432/ai_platform

      # Redis (conectado a redis container)
      - REDIS_URL=redis://redis:6379/0

      # Celery (broker y backend separados por DB)
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

      # Seguridad
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24

      # LLM (Odin)
      - NAN_API_KEY=${NAN_API_KEY}
      - NAN_API_URL=${NAN_API_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-nan}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-qwen3.6}
      - FAST_MODEL=${FAST_MODEL:-qwen3.6}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-qwen/qwen-2.5-72b-instruct}

      # WhatsApp
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}

      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}

      # Discord
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}

      # Logging
      - LOG_LEVEL=INFO

      # CORS (actualizar con dominio real)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://dashboard.tu-dominio.com}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    volumes:
      - ai-platform-logs:/app/logs
      - document-storage:/data/documents
    networks:
      - ai-platform-network

    # Límites de recursos
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ---- PostgreSQL (SOLO RED INTERNA) ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ai_platform
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai-platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiplatform -d ai_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Redis (SOLO RED INTERNA) ----
  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-platform-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- Nginx (Reverse Proxy + SSL) ----
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-platform-nginx
    restart: unless-stopped
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-vmi3151337.contaboserver.net}
      - NGINX_SSL_CERT_PATH=${NGINX_SSL_CERT_PATH:-/etc/letsencrypt/live/vmi3151337.contaboserver.net/fullchain.pem}
      - NGINX_SSL_KEY_PATH=${NGINX_SSL_KEY_PATH:-/etc/letsencrypt/live/vmi3151337.contaboserver.net/privkey.pem}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:rw
      - ./nginx/ssl/live:/etc/letsencrypt/live:ro
    depends_on:
      - app
    networks:
      - ai-platform-network

# ============================================================
# Volúmenes para persistencia
# ============================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ai-platform-logs:
    driver: local
  document-storage:
    driver: local

# ============================================================
# Red aislada para los servicios
# ============================================================
networks:
  ai-platform-network:
    driver: bridge
