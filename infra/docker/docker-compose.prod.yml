# ============================================================
# Docker Compose para Produccion en VPS
# ============================================================
# Servicios:
#   - app: AI Platform backend (FastAPI + Odin)
#   - postgres: Base de datos PostgreSQL
#   - redis: Broker de Celery
#   - nginx: Reverse proxy con HTTPS
#
# PUERTOS:
#   - 80  → HTTP (redirige a 443)
#   - 443 → HTTPS (nginx proxya a app:4000)
#   - 5432 → PostgreSQL (SOLO interno, redes docker)
#   - 6379 → Redis (SOLO interno, redes docker)
#
# Uso:
#   docker compose -f infra/docker/docker-compose.prod.yml up -d
#
# Seguridad:
#   - Solo 80 y 443 expuestos al exterior
#   - PostgreSQL/Redis en red privada (ai-platform-network)
#   - Let's Encrypt SSL con certbot montado en ./nginx/ssl
# ============================================================

services:
  # ---- AI Platform Backend ----
  app:
    image: ai-platform-app:latest
    container_name: ai-platform-api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      # Entorno
      - APP_ENV=production
      - ENVIRONMENT=production
      - DEBUG=false

      # Base de datos (conectado a postgres container)
      - DATABASE_URL=postgresql+psycopg://aiplatform:${POSTGRES_PASSWORD}@postgres:5432/ai_platform

      # Redis (conectado a redis container)
      - REDIS_URL=redis://redis:6379/0

      # Celery (broker y backend separados por DB)
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

      # Seguridad
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24

      # LLM (Odin)
      - NAN_API_KEY=${NAN_API_KEY}
      - NAN_API_URL=${NAN_API_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-nan}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-qwen3.6}
      - FAST_MODEL=${FAST_MODEL:-qwen3.6}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-qwen/qwen-2.5-72b-instruct}

      # WhatsApp
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}

      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}

      # Discord
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}

      # Logging
      - LOG_LEVEL=INFO

      # CORS (actualizar con dominio real)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://dashboard.tu-dominio.com}
    networks:
      - ai-platform-network

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-platform-nginx
    restart: unless-stopped
    command: >
      /bin/sh -c "
        cp /etc/nginx/templates/nginx.conf.template /etc/nginx/nginx.conf &&
        rm -f /etc/nginx/conf.d/default.conf;
        until getent hosts ai-platform-api >/dev/null 2>&1; do
          echo 'Waiting for app container DNS...';
          sleep 1;
        done;
        nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl/:/etc/nginx/ssl/:ro
    depends_on:
      - app
    networks:
      - ai-platform-network

  # ---- PostgreSQL (Base de Datos Principal) ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ai_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai-platform-network
    # Solo accesible desde la red docker interna (no expuesto al host)
    expose:
      - "5432"

  # ---- Redis (Broker de Celery) ----
  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ai-platform-network
    # Solo accesible desde la red docker interna (no expuesto al host)
    expose:
      - "6379"

networks:
  ai-platform-network:
    driver: bridge

# ============================================================
# Volúmenes para persistencia
# ============================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ai-platform-logs:
    driver: local
  document-storage:
    driver: local